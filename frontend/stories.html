<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Storyverse - Stories</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Tailwind Configuration: Obsidian Canvas -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8B5CF6", 
                        "on-primary": "#FFFFFF", 
                        "primary-container": "#4C1D95", 
                        "on-primary-container": "#F5F3FF",
                        "background": "#050505", 
                        "surface": "#0A0A0A",
                        "surface-container-lowest": "#000000",
                        "surface-container-low": "#121212",
                        "surface-container": "#171717",
                        "surface-container-high": "#1E1E1E",
                        "surface-container-highest": "#262626",
                        "surface-variant": "#262626",
                        "on-surface": "#F1F5F9",
                        "on-surface-variant": "#94A3B8",
                        "outline": "#334155",
                        "outline-variant": "#1E293B",
                        "secondary": "#06B6D4", 
                        "on-secondary": "#FFFFFF",
                        "error": "#EF4444",
                        "on-error": "#FFFFFF"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["'Space Grotesk'", "sans-serif"],
                        "body": ["'Inter'", "sans-serif"],
                        "label": ["'Inter'", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .shadow-ambient { box-shadow: 0 0 48px 0 rgba(139, 92, 246, 0.05); }
        .shadow-ambient-hover { box-shadow: 0 0 48px 0 rgba(139, 92, 246, 0.15); }
        .glass-panel { background-color: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .ghost-border { border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
<style>
    body { min-height: max(884px, 100dvh); }
  </style>
  </head>
<body class="bg-background text-on-surface font-body antialiased selection:bg-primary-container selection:text-white relative overflow-x-hidden">
<!-- Vibrant Animated Background Blobs -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary/20 blur-[120px] animate-pulse"></div>
    <div class="absolute top-[20%] -right-[10%] w-[40%] h-[60%] rounded-full bg-secondary/10 blur-[100px]" style="animation: pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;"></div>
    <div class="absolute -bottom-[20%] left-[20%] w-[60%] h-[50%] rounded-full bg-fuchsia-600/10 blur-[120px]" style="animation: pulse 10s cubic-bezier(0.4, 0, 0.6, 1) infinite;"></div>
</div>

<div class="relative flex h-auto min-h-screen w-full flex-col bg-transparent overflow-x-hidden pb-24 z-10">
<!-- Top App Bar -->
<div class="flex items-center glass-panel border-b border-white/10 p-4 pb-3 justify-between sticky top-0 z-40 shadow-lg">
<div class="text-on-surface flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 24px;">view_agenda</span>
</div>
<h2 class="font-headline text-2xl font-bold tracking-tight flex-1 text-center pr-12 text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Storyverse Archives</h2>
</div>

<!-- Story Feed -->
<div id="storyFeed" class="flex flex-col gap-8 px-4 md:px-8 max-w-6xl mx-auto w-full mt-6 pb-8">
    <div id="loadingFeedStatus" aria-live="polite" class="flex items-center justify-center gap-3 text-primary mt-8 py-4">
        <span class="animate-spin material-symbols-outlined">progress_activity</span>
        <span class="font-label text-sm uppercase tracking-widest">Loading Archives...</span>
    </div>
<!-- Dynamic Stories will be injected here -->
</div>

<!-- Bottom Nav Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 overflow-hidden h-[76px]">
<div class="relative flex h-auto w-full flex-col bg-background">
<nav class="flex gap-2 border-t border-white/5 glass-panel px-4 pb-3 pt-2" aria-label="Main Navigation">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-on-surface-variant hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-lg p-1" href="home.html">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-xs font-medium">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded-lg p-1" href="stories.html" aria-current="page">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<p class="text-xs font-medium">Stories</p>
</a>
</nav>
</div>
</div>
</div>

<!-- Template for Story Card (Split Pane Layout) -->
<template id="storyCardTemplate">
<div class="group flex flex-col md:flex-row bg-surface/80 backdrop-blur-xl rounded-2xl overflow-hidden shadow-2xl hover:shadow-[0_0_50px_rgba(139,92,246,0.2)] transition-all duration-300 border border-white/10 w-full mb-8 relative">
    
    <!-- Glowing Accent border on hover -->
    <div class="absolute -inset-1 bg-gradient-to-r from-primary via-fuchsia-500 to-secondary rounded-2xl blur-lg opacity-0 group-hover:opacity-30 transition duration-1000 -z-10"></div>

    <!-- Left Pane: Content (60%) -->
    <div class="flex flex-col w-full md:w-[60%] p-6 md:p-8 justify-between border-b md:border-b-0 md:border-r border-white/10 relative z-10 bg-surface/50">
        <div class="flex flex-col gap-4">
            <div class="flex items-center gap-2">
                <span class="bg-gradient-to-r from-primary to-secondary text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest font-label shadow-lg">AI Forged</span>
                <span class="text-secondary text-sm font-medium story-date">Just now</span>
            </div>
            <h3 class="story-title text-transparent bg-clip-text bg-gradient-to-r from-white to-white/70 font-headline text-3xl md:text-4xl font-bold leading-tight drop-shadow-md">Title</h3>
            <div class="prose prose-invert prose-p:leading-relaxed max-w-none mt-2">
                <p class="story-content text-on-surface font-body text-lg font-light whitespace-pre-wrap">Content...</p>
            </div>
        </div>
    </div>

    <!-- Right Pane: Media Showcase (40%) - Highly distinct -->
    <div class="flex flex-col w-full md:w-[40%] flex-shrink-0 p-6 md:p-8 gap-8 justify-center relative overflow-hidden bg-background/80">
        <!-- Background Grid/Glow for Media side -->
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 pointer-events-none"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-primary/10 to-fuchsia-600/10 z-0 pointer-events-none"></div>
        
        <!-- Comic Image container with glowing frame -->
        <div class="relative z-10 w-full rounded-2xl p-1 bg-gradient-to-br from-primary/50 to-secondary/30 shadow-[0_0_30px_rgba(6,182,212,0.2)] transform md:-rotate-1 group-hover:rotate-0 transition-transform duration-500">
            <div class="relative w-full aspect-square rounded-xl overflow-hidden bg-surface">
                <div class="absolute inset-0 bg-surface-container-high animate-pulse placeholder-pulse"></div>
                <img class="story-comic absolute inset-0 w-full h-full object-cover z-10 mix-blend-lighten" src="https://placeholder.pics/svg/400" alt="Generated Comic Panel" onload="this.previousElementSibling.style.display='none'" onerror="this.src='https://placeholder.pics/svg/400?text=Image+Lost'"/>
                <div class="absolute top-3 left-3 z-20 bg-background/80 backdrop-blur-md px-3 py-1.5 rounded-lg text-xs text-secondary font-headline tracking-widest border border-secondary/30 uppercase shadow-lg flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">palette</span> The Comic</div>
            </div>
        </div>

        <!-- Meme Image container with glowing frame -->
        <div class="meme-container relative z-10 w-full rounded-2xl p-1 bg-gradient-to-br from-fuchsia-500/50 to-primary/30 shadow-[0_0_30px_rgba(217,70,239,0.2)] transform md:rotate-2 group-hover:rotate-0 transition-transform duration-500 delay-75">
            <div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden bg-surface">
                <div class="absolute inset-0 bg-surface-container-high animate-pulse placeholder-pulse"></div>
                <img class="story-meme absolute inset-0 w-full h-full object-cover z-10" src="https://placeholder.pics/svg/400" alt="Generated Meme" onload="this.previousElementSibling.style.display='none'" onerror="this.src='https://placeholder.pics/svg/400?text=Meme+Lost'"/>
                <div class="absolute bottom-3 right-3 z-20 bg-background/80 backdrop-blur-md px-3 py-1.5 rounded-lg text-xs text-primary font-headline tracking-widest border border-primary/30 uppercase shadow-lg flex items-center gap-2">The Meme <span class="material-symbols-outlined text-[16px]">mood</span></div>
            </div>
        </div>
    </div>

</div>
</template>

<script src="app.js"></script>
</body></html>
