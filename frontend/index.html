<body class="bg-background text-on-surface font-body min-h-screen relative flex items-center justify-center overflow-x-hidden">
<!-- Background Texture/Motif -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none mix-blend-overlay" data-alt="close up of dark rough forged metal armor surface with deep shadows and subtle highlights" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD8rORi0sSvTvR43DStuUBz1u1xxSkCdgqCTpV59_fvPgNogLMziMq31HAfl3RiZQ8o74wT_AIrV5eMeCdMRQZalZFX6zmvi_1M7BFRu4y3JiLM1R4tNHpBmmc-RhdAgLDnCOFYQwtO2TAf_ZceBvE0uOtkL_c9QlNdl49ZtybrWDmHTYq5h8MkK2K3im7wmID6_7E4Rg3RR6ZUYkl2M0IaKL0UuZcMfVjQGyyERKDJnkyWrN-gVnSix3qKXCItN-DoVNoCYkJgOr0'); background-size: cover; background-position: center;">
</div>

<!-- Main Content Container (The Citadel Plateau) -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Header -->
<div class="flex flex-col items-center mb-12">
<span class="material-symbols-outlined text-4xl text-primary mb-4" style="font-variation-settings: 'FILL' 1;">shield</span>
<h1 class="font-headline text-4xl md:text-5xl tracking-[-0.02em] text-primary mb-2">Storyverse</h1>
<p class="font-body text-on-surface-variant text-sm">Enter the Citadel</p>
</div>
<!-- Form Card (Armor Plate) -->
<div class="bg-surface-container-low p-8 rounded-DEFAULT ambient-shadow flex flex-col gap-8">
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); window.location.href='home.html';">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-sm text-on-surface-variant font-semibold ml-1" for="email">Email</label>
<input class="h-14 bg-surface-container-lowest text-on-surface px-4 rounded-DEFAULT border-none focus:ring-1 focus:ring-primary/40 focus:outline-none placeholder:text-on-surface-variant/40 font-body transition-shadow" id="email" placeholder="knight@realm.com" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end ml-1">
<label class="font-label text-sm text-on-surface-variant font-semibold" for="password">Password</label>
<a class="font-label text-xs text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<input class="h-14 bg-surface-container-lowest text-on-surface px-4 rounded-DEFAULT border-none focus:ring-1 focus:ring-primary/40 focus:outline-none placeholder:text-on-surface-variant/40 font-body transition-shadow" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary CTA (The Gauntlet) -->
<button class="mt-2 h-14 w-full bg-gradient-to-br from-primary to-on-primary-container text-on-primary font-label font-bold tracking-wide rounded-DEFAULT hover:brightness-110 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">login</span>
</button>
</form>

</div>
