<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Storyverse - Forge</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Tailwind Theme Configuration: Obsidian Canvas -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "primary": "#8B5CF6", // Neon Violet
                "on-primary": "#FFFFFF", 
                "primary-container": "#4C1D95", 
                "on-primary-container": "#F5F3FF",
                "background": "#050505", // Absolute dark
                "surface": "#0A0A0A",
                "surface-container-lowest": "#000000",
                "surface-container-low": "#121212",
                "surface-container": "#171717",
                "surface-container-high": "#1E1E1E",
                "surface-container-highest": "#262626",
                "surface-variant": "#262626",
                "on-surface": "#F1F5F9",
                "on-surface-variant": "#94A3B8",
                "outline": "#334155",
                "outline-variant": "#1E293B",
                "secondary": "#06B6D4", // Cyan
                "on-secondary": "#FFFFFF",
                "error": "#EF4444",
                "on-error": "#FFFFFF"
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "fontFamily": {
                "headline": ["'Space Grotesk'", "sans-serif"],
                "body": ["'Inter'", "sans-serif"],
                "label": ["'Inter'", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        .ambient-shadow { box-shadow: 0 0 48px rgba(139, 92, 246, 0.05); }
        .ambient-shadow-primary { box-shadow: 0 0 32px rgba(139, 92, 246, 0.2); }
        .glass-panel { background-color: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .ghost-border { border: 1px solid rgba(255, 255, 255, 0.05); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased relative overflow-x-hidden">
<!-- Vibrant Animated Background Blobs -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary/20 blur-[120px] animate-pulse"></div>
    <div class="absolute top-[20%] -right-[10%] w-[40%] h-[60%] rounded-full bg-secondary/10 blur-[100px]" style="animation: pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;"></div>
    <div class="absolute -bottom-[20%] left-[20%] w-[60%] h-[50%] rounded-full bg-fuchsia-600/10 blur-[120px]" style="animation: pulse 10s cubic-bezier(0.4, 0, 0.6, 1) infinite;"></div>
</div>

<!-- The Shield Header -->
<header class="fixed top-0 left-0 right-0 z-50 glass-panel px-6 py-4 flex items-center justify-between border-b border-white/10 shadow-lg">
<h1 class="font-headline text-2xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Storyverse</h1>
<div class="flex items-center gap-5">
<button class="relative text-on-surface hover:text-primary transition-colors focus:ring-2 focus:ring-primary focus:outline-none rounded-full p-1" aria-label="Notifications">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(139,92,246,0.8)]"></span>
</button>
<button class="text-on-surface hover:text-primary transition-colors focus:ring-2 focus:ring-primary focus:outline-none rounded-full p-1" aria-label="Settings">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full max-w-4xl mx-auto pt-24 pb-32 px-6 flex flex-col gap-8">
<!-- Hero Section: Welcome Plate (Colorful) -->
<section class="flex flex-col gap-6 relative z-10">
<div class="w-full h-32 md:h-48 rounded-2xl overflow-hidden relative shadow-[0_0_50px_rgba(139,92,246,0.15)] border border-white/10 group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/30 via-background to-secondary/20"></div>
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30 mix-blend-overlay"></div>
<div class="absolute bottom-6 left-6 right-6">
<h2 class="font-headline text-4xl md:text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-white to-white/70 drop-shadow-lg group-hover:scale-[1.01] transition-transform">Welcome to the Verse</h2>
<p class="font-body text-secondary text-base md:text-lg mt-2 font-medium tracking-wide">Forge epic tales and viral memes instantly.</p>
</div>
</div>
<!-- Generation Form (Elevated & Glowing) -->
<div class="bg-surface/80 backdrop-blur-xl rounded-2xl p-6 md:p-8 border border-white/10 shadow-2xl flex flex-col gap-4 relative overflow-hidden group hover:border-primary/50 transition-colors duration-500">
    <div class="absolute -inset-1 bg-gradient-to-r from-primary via-fuchsia-500 to-secondary rounded-2xl blur-lg opacity-20 group-hover:opacity-40 transition duration-1000"></div>
    <div class="relative z-10 flex flex-col gap-4">
        <h3 class="font-headline text-2xl font-bold text-white">Forge a New Epic</h3>
        <label for="promptInput" class="sr-only">Describe the hero, setting, and conflict</label>
        <textarea id="promptInput" class="w-full bg-surface-container-highest text-on-surface border border-outline-variant rounded-lg p-4 font-body placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow resize-y" rows="3" placeholder="Describe the hero, the setting, and the conflict..."></textarea>
        
        <div class="flex justify-end">
            <button id="generateBtn" class="bg-primary text-white font-label font-bold py-3 px-6 rounded-lg flex items-center gap-2 hover:bg-primary-container hover:text-white transition-all ambient-shadow-primary cursor-pointer focus:ring-2 focus:ring-white focus:outline-none focus:ring-offset-2 focus:ring-offset-background">
            <span class="material-symbols-outlined" data-icon="swords" style="font-variation-settings: 'FILL' 1;">electric_bolt</span>
            <span class="text-sm uppercase tracking-wider">Generate</span>
            </button>
        </div>
        
        <div id="loadingStatus" aria-live="polite" class="hidden flex items-center justify-center gap-3 text-primary mt-4 py-4">
            <span class="animate-spin material-symbols-outlined">progress_activity</span>
            <span class="font-label text-sm uppercase tracking-widest">Forging in the Verse...</span>
        </div>
    </div>
</div>
</section>

</main>

<!-- Bottom Nav Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 overflow-hidden h-[76px]">
<div class="relative flex h-auto w-full flex-col bg-background">
<nav class="flex gap-2 border-t border-white/5 glass-panel px-4 pb-3 pt-2" aria-label="Main Navigation">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded-lg p-1" href="home.html" aria-current="page">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<p class="text-xs font-medium">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-on-surface-variant hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-lg p-1" href="stories.html">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<p class="text-xs font-medium">Stories</p>
</a>
</nav>
</div>
</div>

<script src="app.js"></script>
</body></html>
